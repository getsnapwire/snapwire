name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: snapwire
          POSTGRES_PASSWORD: snapwire
          POSTGRES_DB: snapwire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://snapwire:snapwire@localhost:5432/snapwire_test
      SESSION_SECRET: ci-test-secret-not-for-production
      TESTING: "1"
      SNAPWIRE_TELEMETRY: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install -e ".[dev]" 2>/dev/null || true
          pip install pytest pytest-cov flask flask-sqlalchemy flask-login \
            flask-dance flask-limiter gunicorn psycopg2-binary bcrypt \
            anthropic openai pyjwt requests werkzeug sqlalchemy

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linter
        run: |
          pip install --upgrade pip
          pip install pyflakes

      - name: Lint with pyflakes
        run: |
          pyflakes main.py app.py models.py replit_auth.py src/ || true

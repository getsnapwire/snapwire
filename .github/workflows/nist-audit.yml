name: NIST Compliance Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  nist-audit:
    name: Tests + NIST Compliance Grade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run test suite
        id: tests
        run: |
          set +e
          pytest tests/ -v 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Generate NIST compliance report
        id: nist
        env:
          SENTINEL_MODE: enforce
        run: |
          set +e
          python -m sentinel --export-nist 2>&1 | tee nist-output.txt
          GRADE=$(grep -oP 'Grade:\s+\K\S+' nist-output.txt || echo "N/A")
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          cat snapwire-nist-mapping.md >> "$GITHUB_ENV" 2>/dev/null || true

      - name: Post NIST grade as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const testExitCode = '${{ steps.tests.outputs.exit_code }}';
            const grade = '${{ steps.nist.outputs.grade }}' || 'N/A';
            const testStatus = testExitCode === '0' ? 'All Passed' : 'Failures Detected';
            const testEmoji = testExitCode === '0' ? '\u2705' : '\u274c';
            const gradeEmoji = grade === 'A' ? '\ud83c\udfe6' : grade === 'B' ? '\ud83d\udfe1' : '\ud83d\udfe0';

            let nistReport = '';
            try {
              nistReport = fs.readFileSync('snapwire-nist-mapping.md', 'utf8');
            } catch (e) {
              nistReport = '_NIST report file not generated._';
            }

            const body = [
              `## ${gradeEmoji} Snapwire NIST Compliance Audit`,
              '',
              '| Metric | Result |',
              '|---|---|',
              `| ${testEmoji} Test Suite | ${testStatus} |`,
              `| ${gradeEmoji} NIST Compliance Grade | **${grade}** |`,
              '',
              '<details>',
              '<summary>Full NIST Compliance Report</summary>',
              '',
              nistReport,
              '',
              '</details>',
              '',
              '---',
              '_Generated by Snapwire Sentinel NIST Audit Action_',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1

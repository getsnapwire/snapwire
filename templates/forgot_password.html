<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapwire — Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0D10; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .card { background: #151A21; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 420px; border: 1px solid #273140; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo .shield { font-size: 36px; }
        .logo h1 { font-size: 22px; color: #FF6B00; margin-top: 8px; }
        .logo p { font-size: 14px; color: #8B919A; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #F0EEE9; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #273140; border-radius: 8px; font-size: 14px; color: #F0EEE9; background: #0B0D10; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #FF6B00; box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
        .btn { width: 100%; padding: 12px; background: #FF6B00; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #E56000; }
        .success { background: #1a3d2a; color: #00F5D4; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; border: 1px solid #2d5a3d; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #8B919A; }
        .footer a { color: #FF6B00; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="shield">⚡</div>
            <h1>Snapwire</h1>
            <p>Reset your password</p>
        </div>
        {% if message %}
        <div class="success">{{ message }}</div>
        {% endif %}
        <form method="POST" action="/auth/forgot-password">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn">Send Reset Link</button>
        </form>
        <div class="footer">
            <a href="/auth/login">Back to sign in</a>
        </div>
    </div>
    <div style="text-align:center;padding:16px 24px;font-size:11px;color:#7d8295;opacity:0.7;border-top:1px solid #2a2f3d;margin-top:32px;">
        Snapwire is a technical monitoring utility. Use at your own risk. User assumes all liability for agent behavior.
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapwire — Admin Login</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0B0D10; color: #F0EEE9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #151A21; border: 1px solid rgba(39,49,64,0.6); border-radius: 16px; padding: 48px 40px; max-width: 440px; width: 100%; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #FF6B00, #CC5500); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .subtitle { color: #8B919A; font-size: 14px; margin-bottom: 32px; }
        .email-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.2); border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #FF6B00; font-weight: 600; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #8B919A; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 14px; background: #0B0D10; border: 1px solid rgba(39,49,64,0.6); border-radius: 8px; color: #F0EEE9; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #FF6B00; }
        .btn { width: 100%; padding: 14px; background: #FF6B00; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #E56000; }
        .btn-magic { background: transparent; border: 1px solid rgba(255,107,0,0.4); color: #FF6B00; margin-top: 12px; }
        .btn-magic:hover { background: rgba(255,107,0,0.1); }
        .error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #5A6270; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(39,49,64,0.6); }
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #5A6270; text-decoration: none; }
        .back-link:hover { color: #8B919A; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span class="logo-icon">&#x26A1;</span> Snapwire</div>
        <p class="subtitle">Admin login</p>
        <div class="email-badge">&#x1F512; {{ admin_email }}</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <div id="magic-status" style="display:none;"></div>

        <button class="btn btn-magic" id="magic-btn" onclick="sendMagicLink()">Send me a sign-in link</button>

        <div class="divider">or sign in with password</div>

        <form method="POST" action="/admin-agent">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter your password">
            <button type="submit" class="btn">Sign In</button>
        </form>
        <a href="/" class="back-link">&larr; Back to homepage</a>
    </div>
    <script>
        async function sendMagicLink() {
            const btn = document.getElementById('magic-btn');
            const status = document.getElementById('magic-status');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            status.style.display = 'none';
            try {
                const res = await fetch('/admin-agent/magic-link', { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    status.className = 'success';
                    status.textContent = 'Sign-in link sent to ' + data.email + '. Check your inbox.';
                    status.style.display = 'block';
                    btn.textContent = 'Link sent — check your email';
                } else {
                    status.className = 'error';
                    status.textContent = data.error || 'Failed to send link.';
                    status.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Send me a sign-in link';
                }
            } catch(e) {
                status.className = 'error';
                status.textContent = 'Network error. Please try again.';
                status.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send me a sign-in link';
            }
        }
    </script>
</body>
</html>

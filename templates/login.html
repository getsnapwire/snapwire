<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Agentic Firewall</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1><span class="shield">&#128737;</span> Agentic Firewall</h1>
    </div>
    <div class="container">
        <div style="max-width:440px;margin:60px auto;text-align:center;">
            <div style="font-size:72px;margin-bottom:24px;">&#128737;</div>
            <h2 style="margin-bottom:12px;font-size:24px;">Welcome to the Agentic Firewall</h2>
            <p style="color:var(--text-secondary);margin-bottom:32px;line-height:1.6;">
                Your AI safety dashboard. Sign in to monitor, approve, and control what your AI agents can do.
            </p>
            <a href="{{ login_url }}" class="btn btn-approve" style="text-decoration:none;display:inline-block;padding:14px 40px;font-size:16px;border-radius:10px;">
                Sign In to Continue
            </a>
            <p style="color:var(--text-secondary);margin-top:20px;font-size:12px;opacity:0.6;">
                You can sign in with Google, GitHub, or email
            </p>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapwire — New Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .card { background: #161b22; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 420px; border: 1px solid #30363d; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo .shield { font-size: 36px; }
        .logo h1 { font-size: 22px; color: #FF6600; margin-top: 8px; }
        .logo p { font-size: 14px; color: #8b949e; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #c9d1d9; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #30363d; border-radius: 8px; font-size: 14px; color: #c9d1d9; background: #0d1117; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #FF6600; box-shadow: 0 0 0 3px rgba(255,102,0,0.15); }
        .btn { width: 100%; padding: 12px; background: #FF6600; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #E55C00; }
        .error { background: #3d1a1a; color: #f85149; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; border: 1px solid #5a2d2d; }
        .hint { font-size: 11px; color: #6e7681; margin-top: 4px; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #8b949e; }
        .footer a { color: #FF6600; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="shield">⚡</div>
            <h1>Snapwire</h1>
            <p>Set a new password</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/auth/reset-password/{{ token }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
                <div class="hint">Must be at least 8 characters</div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
            </div>
            <button type="submit" class="btn">Reset Password</button>
        </form>
        <div class="footer">
            <a href="/auth/login">Back to sign in</a>
        </div>
    </div>
    <div style="text-align:center;padding:16px 24px;font-size:11px;color:#7d8295;opacity:0.7;border-top:1px solid #2a2f3d;margin-top:32px;">
        Snapwire is a technical monitoring utility. Use at your own risk. User assumes all liability for agent behavior.
    </div>
</body>
</html>

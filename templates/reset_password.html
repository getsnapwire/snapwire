<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Agentic Firewall</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo .shield { font-size: 36px; }
        .logo h1 { font-size: 22px; color: #1e293b; margin-top: 8px; }
        .logo p { font-size: 14px; color: #64748b; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; color: #1e293b; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #4d8bff; box-shadow: 0 0 0 3px rgba(77,139,255,0.1); }
        .btn { width: 100%; padding: 12px; background: #4d8bff; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #3b7aed; }
        .error { background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; border: 1px solid #fecaca; }
        .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
        .footer a { color: #4d8bff; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="shield">&#128737;</div>
            <h1>Agentic Firewall</h1>
            <p>Set a new password</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/auth/reset-password/{{ token }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
                <div class="hint">Must be at least 8 characters</div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
            </div>
            <button type="submit" class="btn">Reset Password</button>
        </form>
        <div class="footer">
            <a href="/auth/login">Back to sign in</a>
        </div>
    </div>
</body>
</html>

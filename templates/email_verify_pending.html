<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapwire — Verify Email</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111827; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .card { background: #1f2937; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 420px; text-align: center; border: 1px solid #374151; }
        .logo .shield { font-size: 36px; }
        .logo h1 { font-size: 22px; color: #FF6600; margin-top: 8px; }
        .logo p { font-size: 14px; color: #9ca3af; margin-top: 4px; }
        .icon { font-size: 48px; margin: 24px 0 16px; }
        .info { font-size: 14px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 24px; background: #FF6600; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s; }
        .btn:hover { background: #E55C00; }
        .success { background: #1a3d2a; color: #3fb950; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; border: 1px solid #2d5a3d; }
        .footer { margin-top: 20px; font-size: 13px; color: #9ca3af; }
        .footer a { color: #FF6600; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="shield">⚡</div>
            <h1>Snapwire</h1>
        </div>
        <div class="icon">&#9993;</div>
        {% if message %}
        <div class="success">{{ message }}</div>
        {% endif %}
        <p class="info">Check your email to verify your account. We've sent a verification link to your inbox.</p>
        <a href="/auth/resend-verification" class="btn">Resend Verification Email</a>
        <div class="footer">
            <a href="/auth/logout">Sign out</a>
        </div>
    </div>
    <div style="text-align:center;padding:16px 24px;font-size:11px;color:#7d8295;opacity:0.7;border-top:1px solid #2a2f3d;margin-top:32px;">
        Snapwire is a technical monitoring utility. Use at your own risk. User assumes all liability for agent behavior.
    </div>
</body>
</html>

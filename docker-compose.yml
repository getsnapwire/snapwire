version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://firewall:firewall@db:5432/snapwire
      - SESSION_SECRET=change-me-to-a-random-string
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16.2-alpine
    environment:
      - POSTGRES_USER=firewall
      - POSTGRES_PASSWORD=firewall
      - POSTGRES_DB=snapwire
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firewall"]
      interval: 5s
      timeout: 5s
      retries: 5

  sentinel:
    build:
      context: .
      dockerfile: sentinel/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SENTINEL_PORT=8080
      - SENTINEL_MODE=audit
      - SNAPWIRE_URL=http://app:5000
      - UPSTREAM_URL=https://api.openai.com
      - SNAPWIRE_API_KEY=
      - SENTINEL_AGENT_ID=sentinel-proxy
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

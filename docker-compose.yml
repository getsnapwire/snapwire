version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://firewall:firewall@db:5432/agentic_firewall
      - SESSION_SECRET=change-me-to-a-random-string
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=firewall
      - POSTGRES_PASSWORD=firewall
      - POSTGRES_DB=agentic_firewall
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firewall"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
